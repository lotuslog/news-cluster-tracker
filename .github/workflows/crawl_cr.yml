name: 클러스터 수집

on:
  workflow_dispatch:

concurrency:
  group: crawl-job
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      matrix:
        section: ["정치,100", "경제,101", "사회,102", "생활/문화,103", "세계,104", "IT/과학,105"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Python 3.11 설정
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: |
          playwright install chromium
          sudo apt-get install -y \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2

      - name: 크롤러 실행
        env:
          GCP_SA_JSON:    ${{ secrets.GCP_SA_JSON }}
          BQ_PROJECT:     ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:     naver_cluster
          TARGET_SECTION: ${{ matrix.section }}
        run: python naver_cluster_crawler_cr.py

  notify:
    needs: crawl
    if: failure()
    runs-on: ubuntu-22.04
    steps:
      - name: 실패 메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ 클러스터 크롤러 실패 - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO }}
          from: 클러스터 크롤러 알림
          body: |
            6개 섹션 중 1개 이상이 실패했습니다.

            저장소: ${{ github.repository }}
            실행 ID: ${{ github.run_id }}
            실행 로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
